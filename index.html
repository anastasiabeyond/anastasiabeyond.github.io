<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anastasia Beyond | Official Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .header-banner {
            width: 100%;
            height: 380px;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            text-align: center;
            padding: 20px;
            position: relative;
        }

        .user-icon-top {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .profile-name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
            text-shadow: 0px 2px 10px rgba(0,0,0,0.8);
        }

        .profile-username {
            font-size: 15px;
            color: #888888;
            margin-bottom: 20px;
            text-shadow: 0px 1px 5px rgba(0,0,0,0.8);
        }

        /* FILA SUPERIOR: ICONOS REDONDOS MONOCROMÁTICOS */
        .social-icons-row {
            display: flex;
            gap: 14px;
            margin-bottom: 10px;
            justify-content: center;
            width: 100%;
        }

        .icon-circle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #ffffff;
            text-decoration: none;
            background: #121212;
            border: 1px solid #222222;
            transition: background 0.2s, transform 0.2s;
        }

        .icon-circle:active {
            transform: scale(0.95);
            background: #1a1a1a;
        }

        .bio-text {
            font-size: 15px;
            color: #ffffff;
            text-align: center;
            margin: 25px 0;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .content-links {
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .image-card {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            text-decoration: none;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .image-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.15) 70%);
            z-index: 1;
        }

        /* BADGES ORIGINALES EN TARJETAS */
        .card-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            z-index: 2;
        }

        .badge-youtube { background: #FF0000; }
        .badge-link { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); }

        .card-text {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            z-index: 2;
            text-align: center;
            width: 100%;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* BOTONES ALARGADOS ORIGINALES CON DEGRADADO METÁLICO */
        .long-button {
            width: 100%;
            height: 56px;
            border-radius: 30px;
            background: linear-gradient(90deg, #ffffff 0%, #1a1e29 35%, #0d1017 100%);
            display: flex;
            align-items: center;
            padding: 4px 6px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 15px;
            position: relative;
            transition: transform 0.2s;
        }

        .long-button:active {
            transform: scale(0.98);
        }

        .btn-icon-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        /* COLORES ORIGINALES INTERNOS DE LOS BOTONES */
        .btn-ic-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-ic-tiktok { background: #000000; }
        .btn-ic-x { background: #000000; }

        .btn-label {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .footer-tabs {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 35px;
            font-size: 14px;
            color: #444444;
        }

        .tab-item.active {
            color: #ffffff;
            font-weight: 600;
            border-bottom: 2px solid white;
            padding-bottom: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="user-icon-top"><i class="fa-regular fa-user"></i></div>

        <div class="header-banner" style="background-image: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,1)), url('anastasia_main.jpeg');">
            <h1 class="profile-name">Anastasia Beyond</h1>
            <div class="profile-username">@anastasiabeyond</div>
            
            <div class="social-icons-row">
                <a href="https://youtube.com/@anastasiabeyond" class="icon-circle"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://instagram.com/anastasiabeyond" class="icon-circle"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://tiktok.com/@anastasiabeyond" class="icon-circle"><i class="fa-brands fa-tiktok"></i></a>
                <a href="https://x.com/anastasiabeyond" class="icon-circle"><i class="fa-brands fa-x-twitter"></i></a>
            </div>
        </div>

        <div class="bio-text">Beyond imagination</div>

        <div class="content-links">
            
            <a href="https://youtube.com/@anastasiabeyond" class="image-card" style="background-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.15) 70%), url('youtube_card.jpeg');">
                <div class="card-badge badge-youtube"><i class="fa-brands fa-youtube"></i></div>
                <div class="card-text">YouTube</div>
            </a>

            <a href="https://link.me/anastasiabeyond" class="image-card" style="background-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.15) 70%), url('exclusive_card.jpeg');">
                <div class="card-badge badge-link"><i class="fa-solid fa-link"></i></div>
                <div class="card-text">Exclusive Content</div>
            </a>

            <a href="https://instagram.com/anastasiabeyond" class="long-button">
                <div class="btn-icon-circle btn-ic-instagram"><i class="fa-brands fa-instagram"></i></div>
                <span class="btn-label">Instagram</span>
            </a>

            <a href="https://tiktok.com/@anastasiabeyond" class="long-button">
                <div class="btn-icon-circle btn-ic-tiktok"><i class="fa-brands fa-tiktok"></i></div>
                <span class="btn-label">TikTok</span>
            </a>

            <a href="https://x.com/anastasiabeyond" class="long-button">
                <div class="btn-icon-circle btn-ic-x"><i class="fa-brands fa-x-twitter"></i></div>
                <span class="btn-label">X</span>
            </a>

        </div>

        <div class="footer-tabs">
            <span class="tab-item active">Shouts</span>
            <span class="tab-item">Media</span>
        </div>

    </div>

</body>
</html>
